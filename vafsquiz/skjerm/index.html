<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Storskjerm — Hvor mye vet du om oss?</title>
  <link rel="stylesheet" href="../css/style.css" />
  <!-- canvas-confetti for vinnertrekning -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <header class="logo-topp">
    <img class="logo-bilde" src="../img/VAFSlogo.png" alt="Vestre Aker Frivilligsentral"
         onerror="this.style.display='none'" />
  </header>
  <div class="skjerm-rot">

    <!-- LOBBY -->
    <section id="view-lobby">
      <h1 class="skjerm-tittel">Hvor mye vet du om oss?</h1>
      <img class="felles-bilde" src="../img/felles.jpg" alt="Mons, Anita og Espen"
           onerror="this.style.display='none'" />
      <p class="presentasjon">📱 Gå inn på denne adressen på mobilen din for å bli med:</p>
      <div class="url-boks">frivilligsentralen.org/vafsquiz</div>
    </section>

    <!-- QUESTION -->
    <section id="view-question" class="skjult">
      <div class="merke" id="q-merke">Spørsmål 1 av 10</div>
      <h2 class="skjerm-sporsmal" id="q-tekst"></h2>
      <div class="skjerm-alternativer" id="q-alternativer"></div>
      <p class="skjerm-sporsmal" style="font-size:clamp(22px,3vw,38px);">
        <span id="q-svart">0</span> av <span id="q-total">0</span> har svart
      </p>
    </section>

    <!-- REVEAL (søyler) -->
    <section id="view-reveal" class="skjult">
      <div class="merke" id="r-merke">Fasit</div>
      <h2 class="skjerm-sporsmal" id="r-tekst"></h2>
      <div class="soyler" id="r-soyler"></div>
    </section>

    <!-- LEADERBOARD -->
    <section id="view-leaderboard" class="skjult">
      <h1 class="skjerm-tittel">🏆 Ledertavle</h1>
      <div class="ledertavle" id="lb-liste"></div>
    </section>

    <!-- RESULTS -->
    <section id="view-results" class="skjult">
      <h1 class="skjerm-tittel">🎊 Resultater</h1>

      <!-- Kvalifiserte: alle med flest riktige (puljen det trekkes blant) -->
      <div id="kvalifiserte-boks">
        <h2 class="skjerm-sporsmal" id="kval-overskrift" style="font-size:clamp(22px,3.4vw,44px);"></h2>
        <div class="ledertavle" id="kval-liste"></div>
      </div>

      <!-- Vinnertrekning -->
      <div class="trekning" id="trekning">
        <div class="hjul" id="hjul"><div class="hjul-navn" id="hjul-navn">Klar for trekning …</div></div>
        <div id="vinner-boks" class="skjult">
          <p class="skjerm-sporsmal" style="margin:0;">🥁 Vinneren er …</p>
          <div class="vinner-navn" id="vinner-navn"></div>
          <p class="presentasjon" id="vinner-info"></p>
        </div>
      </div>

      <!-- Full fasit-oppsummering -->
      <h2 class="skjerm-sporsmal" style="font-size:clamp(22px,3vw,38px);">Fasit</h2>
      <div class="fasit-liste" id="fasit-liste"></div>
    </section>

  </div>

  <audio id="drum" src="../lyd/drum.mp3" preload="auto"></audio>
  <script type="module" src="../js/skjerm.js"></script>
</body>
</html>
