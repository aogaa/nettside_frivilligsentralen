<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Vert — Hvor mye vet du om oss?</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="logo-topp">
    <img class="logo-bilde" src="../img/VAFSlogo.png" alt="Vestre Aker Frivilligsentral"
         onerror="this.style.display='none'" />
  </header>
  <div class="admin-rot">
    <div class="kort" style="max-width:640px;">
      <div class="merke">Vertstyring 🎤</div>
      <h1 class="tittel" style="font-size:clamp(24px,5vw,34px);">Hvor mye vet du om oss?</h1>

      <div class="admin-status">
        <div><span class="steg-merke" id="status-steg">LOBBY</span></div>
        <div class="stor" id="status-tekst" style="margin-top:10px;">Venter på spillere</div>
        <div id="status-detalj" style="margin-top:6px; opacity:.9;"></div>
      </div>

      <div class="admin-knapper">
        <!-- LOBBY -->
        <button id="btn-start" class="knapp stor gronn">▶ Start quiz</button>
        <!-- QUESTION -->
        <button id="btn-fasit" class="knapp stor">Vis fasit</button>
        <!-- REVEAL -->
        <button id="btn-ledertavle" class="knapp stor bla">Vis ledertavle</button>
        <!-- LEADERBOARD -->
        <button id="btn-neste" class="knapp stor">Neste spørsmål →</button>
        <!-- RESULTS -->
        <button id="btn-trekk" class="knapp stor gronn">🥁 Trekk vinner</button>
        <!-- alltid: nullstill -->
        <button id="btn-nullstill" class="knapp grunn" style="font-size:15px; padding:10px;">↺ Nullstill spillet (sletter alle spillere)</button>
      </div>

      <p class="hint" id="hint"></p>
    </div>
  </div>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
